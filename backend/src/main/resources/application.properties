spring.application.name=scheduler
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.profiles.active=local
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT secret must be provided via the JWT_SECRET environment variable (see .env / .env.example).
# No literal secret value is committed here; JwtProvider fails fast on startup if it is missing or too short.
jwt.secret=${JWT_SECRET:}

# Security Settings
app.security.cors.allowed-origins=http://localhost:5173
app.security.cookie.secure=false
app.security.cookie.same-site=Lax
app.security.cookie.domain=

# Session Limits
app.security.session.max-active-sessions=5

