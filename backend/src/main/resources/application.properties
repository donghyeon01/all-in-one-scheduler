spring.application.name=scheduler
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.profiles.active=local
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Database connection can be overridden via environment variables (see .env / .env.production).
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/scheduler?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}

# JWT secret must be provided via the JWT_SECRET environment variable (see .env / .env.example).
# No literal secret value is committed here; JwtProvider fails fast on startup if it is missing or too short.
jwt.secret=${JWT_SECRET:}

# Security Settings
app.security.cors.allowed-origins=${APP_SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.security.cookie.secure=${APP_SECURITY_COOKIE_SECURE:false}
app.security.cookie.same-site=${APP_SECURITY_COOKIE_SAME_SITE:Lax}
app.security.cookie.domain=${APP_SECURITY_COOKIE_DOMAIN:}

# Session Limits
app.security.session.max-active-sessions=5

