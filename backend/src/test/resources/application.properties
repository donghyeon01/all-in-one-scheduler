spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

jwt.secret=my-secret-key-my-secret-key-my-secret-key-my-secret-key

# Security Settings
app.security.cors.allowed-origins=http://localhost:5173
app.security.cookie.secure=false
app.security.cookie.same-site=Lax
app.security.cookie.domain=

# Session Limits
app.security.session.max-active-sessions=5
