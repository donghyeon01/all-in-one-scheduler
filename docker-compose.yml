services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-scheduler}
      MYSQL_USER: ${DB_USERNAME:-scheduler_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-scheduler_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: ${DB_URL:-jdbc:mysql://mysql:3306/scheduler?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul}
      DB_USERNAME: ${DB_USERNAME:-scheduler_user}
      DB_PASSWORD: ${DB_PASSWORD:-scheduler_password}
      JWT_SECRET: ${JWT_SECRET:-change-me-change-me-change-me-change-me}
      APP_SECURITY_CORS_ALLOWED_ORIGINS: ${APP_SECURITY_CORS_ALLOWED_ORIGINS:-http://localhost}
      APP_SECURITY_COOKIE_SECURE: ${APP_SECURITY_COOKIE_SECURE:-false}
      APP_SECURITY_COOKIE_SAME_SITE: ${APP_SECURITY_COOKIE_SAME_SITE:-Lax}
      APP_SECURITY_COOKIE_DOMAIN: ${APP_SECURITY_COOKIE_DOMAIN:-}
      FLYWAY_ENABLED: ${FLYWAY_ENABLED:-true}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  mysql-data:
